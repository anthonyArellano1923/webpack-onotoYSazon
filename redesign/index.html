<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f3ec" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a140d" media="(prefers-color-scheme: dark)" />
  <title>Onoto y Sazón — Hallacas con sabor a casa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles/styles.css" />
  <style>
    /* Form input — used across modals */
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--r-md);
      border: 1px solid var(--line);
      background: var(--bg-elev);
      color: var(--fg);
      font: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color var(--dur-fast), background var(--dur-fast);
    }
    .form-input:focus {
      border-color: var(--onoto-crimson);
      background: var(--bg);
    }
    [data-theme="dark"] .form-input:focus { border-color: var(--onoto-xanthous); }
    textarea.form-input { resize: vertical; font-family: var(--font-ui); }

    /* Tweaks panel positioning so it doesn't collide with FABs */
    .tp-panel { bottom: 24px !important; left: 16px !important; right: auto !important; }
    @media (max-width: 720px) {
      .tp-panel { bottom: 96px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="src/data/packs.js"></script>
  <script type="text/babel" src="src/lib/tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/components/icons.jsx"></script>
  <script type="text/babel" src="src/components/sections.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
